<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <script>
        (function () {
            var key = 'authstudio-theme';

            function resolveTheme(preference) {
                if (preference === 'light' || preference === 'dark') {
                    return preference;
                }

                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            function getPreference() {
                var stored = localStorage.getItem(key);
                return stored === 'light' || stored === 'dark' ? stored : 'system';
            }

            window.authstudioTheme = {
                applyPreference: function (preference) {
                    localStorage.setItem(key, preference);
                    document.documentElement.setAttribute('data-theme', resolveTheme(preference));
                },
                getPreference: getPreference,
                getApplied: function () {
                    return document.documentElement.getAttribute('data-theme') || 'light';
                },
                init: function () {
                    document.documentElement.setAttribute('data-theme', resolveTheme(getPreference()));
                    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
                        if (getPreference() === 'system') {
                            document.documentElement.setAttribute('data-theme', resolveTheme('system'));
                        }
                    });
                }
            };

            window.authstudioTheme.init();
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="OAuth 2.0 and OpenID Connect debugger for authorize URLs, PKCE, CIMD, and private_key_jwt." />
    <title>authstudio</title>
    <link rel="preload" href="css/app.css" as="style" />
    <link rel="preload" href="_framework/blazor.webassembly.js" as="script" />
    <base href="/" />
    <link href="css/app.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="authstudio.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="app-shell">
            <header class="app-header">
                <div class="app-header-brand">
                    <a href="/" class="app-header-title">authstudio</a>
                    <span class="app-header-tagline">OAuth2 + PKCE debugger</span>
                </div>
                <nav class="app-header-nav">
                    <a href="/" class="app-header-link active">Builder</a>
                    <a href="assertion" class="app-header-link">Assertion</a>
                    <a href="code" class="app-header-link">Callback</a>
                    <a href="about" class="app-header-link">About</a>
                </nav>
            </header>
            <main class="app-main">
                <p class="app-boot-status" role="status">Loading workspace…</p>
            </main>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script>
        window.authstudioLoadCrypto = () => {
            if (window.authstudioCrypto) {
                return Promise.resolve();
            }

            if (window.authstudioCryptoLoading) {
                return window.authstudioCryptoLoading;
            }

            window.authstudioCryptoLoading = new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'js/cryptoInterop.js';
                script.onload = () => {
                    delete window.authstudioCryptoLoading;
                    resolve();
                };
                script.onerror = () => {
                    delete window.authstudioCryptoLoading;
                    reject(new Error('Failed to load cryptoInterop.js'));
                };
                document.head.appendChild(script);
            });

            return window.authstudioCryptoLoading;
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
